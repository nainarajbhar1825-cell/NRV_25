<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mini Site</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Navbar + Dropdown -->
<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand">MySite</a>
    <ul class="navbar-nav ms-auto">
      <li class="nav-item dropdown">
        <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown">Menu</a>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item">Item 1</a></li>
          <li><a class="dropdown-item">Item 2</a></li>
        </ul>
      </li>
    </ul>
  </div>
</nav>

<!-- Breadcrumb -->
<div class="container mt-2">
  <ol class="breadcrumb">
    <li class="breadcrumb-item">Home</li>
    <li class="breadcrumb-item active">Page</li>
  </ol>
</div>

<!-- Responsive Layout -->
<div class="container text-center mt-3">
  <div class="row">
    <div class="col-md-4 col-12 bg-primary text-white p-3">1</div>
    <div class="col-md-4 col-12 bg-success text-white p-3">2</div>
    <div class="col-md-4 col-12 bg-danger text-white p-3">3</div>
  </div>
</div>

<!-- Form -->
<div class="container mt-3">
  <input class="form-control mb-2" placeholder="Name">
  <input class="form-control mb-2" placeholder="Email">
  <button class="btn btn-primary">Submit</button>
</div>

<!-- Modal Button -->
<div class="text-center mt-3">
  <button class="btn btn-dark" data-bs-toggle="modal" data-bs-target="#m">Open Modal</button>
</div>

<!-- Modal -->
<div class="modal fade" id="m">
  <div class="modal-dialog">
    <div class="modal-content p-3">
      <h5>Modal Box</h5>
      <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
